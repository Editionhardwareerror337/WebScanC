<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago confirmado — WebScan</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#06080a; --bg-1:#0c1014; --line:#1c2229;
  --primary:#3b82f6; --ok:#34d399; --text-0:#f1f5f9; --text-1:#94a3b8; --text-2:#5b6672;
  --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg-0); color:var(--text-0); font-family:var(--font-body);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  -webkit-font-smoothing:antialiased;
}
.card{
  max-width:480px; width:100%;
  background:var(--bg-1); border:1px solid var(--line); border-radius:16px;
  padding:44px 36px; text-align:center;
}
.ic{
  width:56px;height:56px; border-radius:50%;
  background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3);
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 22px;
}
h1{font-family:var(--font-display); font-weight:600; font-size:24px; letter-spacing:-.01em; margin-bottom:12px;}
p{color:var(--text-1); font-size:14.5px; line-height:1.6; margin-bottom:8px;}
.session{
  margin-top:24px; padding:14px 16px; background:var(--bg-0); border:1px solid var(--line); border-radius:8px;
  font-family:var(--font-mono); font-size:11.5px; color:var(--text-2); word-break:break-all; text-align:left;
}
a.btn{
  display:inline-block; margin-top:28px; padding:12px 26px; border-radius:8px;
  background:var(--primary); color:#fff; font-weight:600; font-size:14px; text-decoration:none;
}
.note{margin-top:18px; font-size:12.5px; color:var(--text-2);}
</style>
</head>
<body>
  <div class="card">
    <div class="ic">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Pago confirmado</h1>
    <p>En unos segundos recibirás un email con tu código de activación.</p>
    <p>Cópialo y pégalo en el panel de WebScan para desbloquear tu plan.</p>
    <div class="session" id="session-id">Procesando referencia de pago…</div>
    <a href="/" class="btn">Ir a WebScan →</a>
    <p class="note">¿No te llega el email en unos minutos? Revisa spam o escríbenos.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sid = params.get('session_id');
    document.getElementById('session-id').textContent = sid
      ? 'Referencia de pago: ' + sid
      : 'No se encontró referencia de pago en la URL.';
  </script>
</body>
</html>
